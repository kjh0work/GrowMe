name: Bug
description: 버그 제보 및 수정 이슈
title: "[Bug] "
labels: ["bug"]
body:
  - type: input
    id: summary
    attributes:
      label: 버그 요약
      description: 어떤 문제가 발생했는지 한 줄로 작성해주세요.
      placeholder: 예) 카테고리 생성 후 앱이 종료됩니다.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 재현 방법
      description: 버그를 재현하는 순서를 작성해주세요.
      placeholder: |
        1. 앱 실행
        2. 카테고리 추가 화면 이동
        3. 저장 버튼 클릭
        4. 앱 종료 발생
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      placeholder: 예) 카테고리가 정상 저장되어야 합니다.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      placeholder: 예) 저장 직후 앱이 종료됩니다.
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 환경 정보
      description: OS, 기기, 앱 버전 등을 작성해주세요.
      placeholder: 예) Android 14 / Galaxy S23 / debug